<title>Soulmate Chat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: radial-gradient(ellipse at center bottom, #3d0a6e 0%, #1a0535 40%, #0a0015 100%), radial-gradient(ellipse at 80% 20%, rgba(139,92,246,0.15) 0%, transparent 50%), radial-gradient(ellipse at 20% 80%, rgba(167,139,250,0.1) 0%, transparent 40%);
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }

  #chat-wrapper {
    width: 100%;
    max-width: 760px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  #chat-header {
    background: linear-gradient(135deg, #6b21a8 0%, #7c3aed 100%);
    box-shadow: 0 2px 25px rgba(139,92,246,0.7), 0 0 60px rgba(109,40,217,0.3);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  #header-avatar {
    width: 42px; height: 42px;
    border-radius: 50%;

    border: 2px solid rgba(255,255,255,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  #header-info { flex: 1; }
  #header-name { color: #fff; font-weight: 600; font-size: 15px; }
  #header-status { color: rgba(255,255,255,0.85); font-size: 13px; }
  #status-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #4ade80;
    margin-right: 5px;
  }
  #messages {
    flex: 1; padding: 16px 16px 100px;
    display: flex; flex-direction: column; gap: 4px; overflow-y: auto;
  }
  .msg-row { display: flex; margin-bottom: 2px; }
  .msg-row.bot { justify-content: flex-start; }
  .msg-row.user { justify-content: flex-end; }
  .msg-bubble {
    max-width: 75%; padding: 10px 14px;
    border-radius: 12px; font-size: 14px; line-height: 1.5; position: relative;
  }
  .msg-bubble.bot { background: #fff; color: #111; border-bottom-left-radius: 3px; }
  .msg-bubble.user { background: #dcf8c6; color: #111; border-bottom-right-radius: 3px; }
  .msg-time {
    font-size: 11px; color: #888; text-align: right; margin-top: 4px;
    display: flex; align-items: center; justify-content: flex-end; gap: 3px;
  }
  .msg-time .tick { color: #4fc3f7; font-size: 13px; }
  .msg-bubble b { font-weight: 700; }
  .typing-indicator {
    background: #fff; border-radius: 12px; border-bottom-left-radius: 3px;
    padding: 12px 16px; display: inline-flex; gap: 5px; align-items: center;
  }
  .typing-dot {
    width: 8px; height: 8px; border-radius: 50%; background: #aaa;
    animation: bounce 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }
  .audio-player {
    background: #fff; border-radius: 12px; border-bottom-left-radius: 3px;
    padding: 10px 14px; display: flex; align-items: center; gap: 10px; max-width: 260px;
  }
  .audio-play-btn {

    border: none; cursor: pointer; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0;
  }
  .audio-play-btn svg { width: 14px; height: 14px; fill: white; }
  .audio-waveform { flex: 1; height: 4px; background: #ddd; border-radius: 2px; overflow: hidden; }
  .audio-progress { height: 100%; background: #25d366; border-radius: 2px; width: 0%; transition: width 0.3s; }
  .audio-duration { font-size: 12px; color: #888; }
  .social-img-bubble {

  .social-img-header { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }

  .social-name { font-weight: 600; font-size: 12px; color: #1a1a2e; }
  .social-verified { color: #1da1f2; font-size: 11px; }

  #input-area {

  #send-btn {
    width: 40px; height: 40px; border-radius: 50%; background: #7c3aed;

    justify-content: center; flex-shrink: 0;
  }
  #send-btn svg { width: 18px; height: 18px; fill: white; }
  a { color: inherit; }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
</style>

<script>
  let userName='',userSign='',inputMode=null;

  function getTime(){const n=new Date();let h=n.getHours(),m=n.getMinutes();const a=h>=12?'PM':'AM';h=h%12||12;return h+':'+(m+'').padStart(2,'0')+' '+a;}

  function showTyping(){setStatus(true);const r=document.createElement('div');r.className='msg-row bot';r.id='typing-row';r.innerHTML='<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';msgsEl.appendChild(r);scrollBottom();}

  let _audioCounter=0;const _audioBase='https://soulmatedivine.com/home/assets/';function addAudio(dur,time){_audioCounter++;const idx=_audioCounter;const r=document.createElement('div');r.className='msg-row bot';r.innerHTML='<div class="audio-player"><button class="audio-play-btn" onclick="playAudio(this,'+idx+')"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button><div class="audio-waveform"><div class="audio-progress" id="ap-'+idx+'"></div></div><span class="audio-duration">'+dur+'</span><div class="msg-time" style="margin-top:0;font-size:11px;color:#888;">'+(time||getTime())+' <span class="tick" style="color:#4fc3f7">✓✓</span></div><audio id="aud-'+idx+'" src="'+_audioBase+idx+'.mp3" preload="none"></audio></div>';msgsEl.appendChild(r);scrollBottom();}
  function playAudio(btn,idx){const aud=document.getElementById('aud-'+idx);const p=document.getElementById('ap-'+idx);if(!aud)return;if(!aud.paused){aud.pause();btn.innerHTML='<svg viewBox="0 0 24 24" style="fill:white;width:14px;height:14px"><path d="M8 5v14l11-7z"/></svg>';return;}aud.play();btn.innerHTML='<svg viewBox="0 0 24 24" style="fill:white;width:14px;height:14px"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';aud.ontimeupdate=()=>{if(aud.duration){p.style.width=(aud.currentTime/aud.duration*100)+'%';}};aud.onended=()=>{btn.innerHTML='<svg viewBox="0 0 24 24" style="fill:white;width:14px;height:14px"><path d="M8 5v14l11-7z"/></svg>';p.style.width='0%';};}
  function addSocial(name,handle,text,e1,e2,time,img){const imgTag=img?'<img src="'+img+'" style="width:100%;border-radius:10px;margin-top:10px;display:block;">':'';const html='<div class="msg-row bot"><div class="msg-bubble bot" style="padding:0;overflow:hidden;max-width:320px;border-radius:14px;"><img src="'+img+'" style="width:100%;display:block;border-radius:14px;"></div></div>';addBot(html,time);}

  function delay(ms){return new Promise(r=>setTimeout(r,ms));}
  async function botSay(html,ms,time){showTyping();await delay(ms||1500);removeTyping();addBot(html,time);}  async function startFlow(){await delay(800);await botSay('Hello, welcome! I\'m glad you didn\'t ignore your destiny🙏🔮<br><br><b>Something big is about to happen in your life.</b>',2000,NOW);await delay(600);await botSay('From the moment you entered the psychic reading room, I could feel that a man\'s energy was very strong...<br><br>He has already crossed your path, but something prevented you from meeting at that moment, and fate is bringing him <b>back into your life</b> ❤️‍🔥',2500,NOW);await delay(600);await botSay('My name is <b>Theresa Caputo</b>, and through the gift I inherited from my grandmother, I carry the mission of helping lost soulmates find each other.<br><br><b>And in just 2 minutes, I will visualize and draw the face of this man who is constantly thinking about you, day and night!</b>',2500,NOW);await delay(600);await botSay('<b>Are you sure you want to know who he is?</b> I must warn you that this may move you or even bring you to tears, but I think you\'ll want to see💕✨',2000,NOW);addChoices([{label:'Yes, I want to discover my soulmate!',fn:step2}]);}
  async function step2(){clearChoices();addUser('Yes, I want to discover my soulmate!');await delay(500);await botSay('Perfect, I\'ll start with the first question that will reveal who your soulmate is. <b>Can you tell me your name?</b>',1800);showInput('Your name...','name');}
  async function step3(name){userName=name;hideInput();addUser(name);await delay(400);await botSay('Amazing, <b>'+userName+'</b>. Right after you told me your name, I could already see a blurry image of a man...',1800);await delay(400);await botSay('This means that your soulmate is someone <b>very close to you, or someone you are about to interact with in the coming days</b>🙏🔮<br><br>Let\'s continue...',2200);await delay(400);await botSay('But before we proceed, let me explain how the procedure works so that we can begin your drawing.',1600);await delay(300);addAudio('0:18');await delay(2000);await botSay('<b>Can I start with the questions?</b> Remember not to cross your legs or arms...',1600);addChoices([{label:'Yes, I am ready',fn:step4}]);}
  async function step4(){clearChoices();addUser('Yes, I am ready');await delay(400);await botSay('What is your sign?',1200);showInput('Write your zodiac sign...','sign');}
  async function step5(sign){userSign=sign;hideInput();addUser(sign);await delay(400);await botSay('What a coincidence, <b>'+userName+'</b>, I am also <b>'+userSign+'</b>.',1500);await delay(300);await botSay('What is your date of birth?',1200);showInput('Example: 03/15/1990','dob');}
  async function step6(dob){hideInput();addUser(dob);await delay(400);await botSay('What time were you born? If you don\'t know the exact time, that\'s okay...',1500);showInput('Example: 15:30','time');}
  async function step7(time){hideInput();addUser(time);await delay(400);await botSay('And lastly, how is your love life going?',1400);addChoices([{label:'I am in a serious relationship.',fn:()=>step8('I am in a serious relationship.')},{label:"I'm getting to know or talking to someone.",fn:()=>step8("I'm getting to know or talking to someone.")},{label:'I am single at the moment!',fn:()=>step8('I am single at the moment!')}]);}
  async function step8(choice){clearChoices();addUser(choice);const isSingle=choice.includes('single');await delay(400);if(isSingle){await botSay('Then you\'re single, <b>'+userName+'</b>!',1400);await botSay('It\'s very rare to find a <b>'+userSign+'</b> single. I feel like you have such a good heart...',1800);}else if(choice.includes('serious')){await botSay('I can feel the energy around your relationship, <b>'+userName+'</b>...',1400);await botSay('Even so, there is a <b>'+userSign+'</b> soul that is deeply connected to yours and thinking of you constantly.',1800);}else{await botSay('I see, <b>'+userName+'</b>. The energy around you is very interesting...',1400);await botSay('There is someone — a <b>'+userSign+'</b> connection — who has been thinking about you intensely.',1800);}await delay(200);addAudio('0:21');await delay(1800);await botSay('One day, these women were also where you are, talking to me...<br><br>And after some time, they sent me these photos 👇',2000);await delay(400);addSocial('Jennifer Smith','jennifersmith','I was getting to know a guy and had doubts if he was the right one. I asked @MadameTheresa to draw my soulmate... when I received the drawing, it was exactly him!!🤯','🎨','👫','https://soulmatedivine.com/home/assets/img-1.webp');await delay(800);await botSay('This is Mayara. She also asked me to reveal the name and traits of the person in the drawing!',1800);await delay(400);addSocial('Mayara Rodrigues','mayararodrigues','¡¡100% grateful to the psychic Serena!! You showed me exactly who my soulmate is! The drawing I received is from my current boyfriend 😍','✏️','💑','https://soulmatedivine.com/home/assets/img-2.webp');await delay(800);await botSay('This is Olivia, in less than 1 month, she had already found the person in the drawing!',1800);await delay(400);await botSay('Isn\'t it amazing, <b>'+userName+'</b>? Would you like to see the characteristics of your soulmate too?',1800);addChoices([{label:'Yes, I want to see the characteristics of my soulmate!',fn:step9},{label:'I prefer to see just the drawing, please!',fn:step9}]);}
  async function step9(){clearChoices();addUser('Yes, I want to see the characteristics of my soulmate!');await delay(400);await botSay('Perfect, <b>'+userName+'</b>. Can I start creating your drawing?',1500);showInput('Your answer...','free');}

  async function step11(){clearChoices();addUser('YES, DRAW MY SOULMATE!');await delay(400);await botSay('You are very close to experiencing a special moment! But now, <b>pay close attention, dear...</b>',1800);await botSay('I am not charging anything for the consultation.',1400);addAudio('0:19');await delay(1500);await botSay('The fee is only <b>$19.90</b>',1200);addAudio('0:17');await delay(1500);await botSay('I will leave a <b>button below</b> for you to make the payment. After that, I will send the portrait of your soulmate by email.',2800);await botSay('In addition to the photo of your soulmate, something very unusual revealed itself during your reading... and I could not ignore it.',2000);await botSay('So, I will also prepare a secret and exclusive bonus that I will only release to you.',1600);await botSay('This secret bonus will leave you speechless, and I could charge a lot for it, but I am going to send it to you for free.',2000);await botSay('On the payment screen, type the number <b>1</b> before your email. Example: if your email is <b>sarah@gmail.com</b>, type <b>1sarah@gmail.com</b>.',2200);await botSay('It is a secret code, a signal between us. That way I can send you the bonus!',1800);addAudio('0:24');await delay(1500);addCTA('YES! I WANT TO RECEIVE MY SOULMATE DRAWING!','https://pay.kiwify.com/YBoT7RO');await delay(800);await botSay('I will be right here waiting, <b>'+userName+'</b>. The universe is already working to bring you two together. 🔮💕',2000);}
  function sendUserInput(){const v=userInputEl.value.trim();if(!v)return;if(inputMode==='name')step3(v);else if(inputMode==='sign')step5(v);else if(inputMode==='dob')step6(v);else if(inputMode==='time')step7(v);else if(inputMode==='free')step10(v);}
